name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeLaGuardo/setup-clojure@13.1
        with:
          cli: latest
      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.cpcache
          key: deps-${{ hashFiles('deps.edn') }}
      - name: Unit tests
        run: clojure -M:test -e "(require '[clojure.test :refer [run-tests]] '[parity.generate-test] '[parity.core-test]) (let [r (run-tests 'parity.generate-test 'parity.core-test)] (System/exit (if (and (zero? (:fail r)) (zero? (:error r))) 0 1)))"
      - name: Init + self-test
        run: |
          clojure -M -m parity.core init --lang
          clojure parity.cljc
      - name: Build JAR
        run: clojure -T:build jar
